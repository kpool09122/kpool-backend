services:
  php:
    build: .
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: ${APP_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: kpool
      DB_USERNAME: kpool
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: redis
      SESSION_CONNECTION: default
      SESSION_STORE: redis
      MAIL_MAILER: smtp
      MAIL_HOST: mail
      MAIL_PORT: 1025
      MAIL_FROM_ADDRESS: noreply@kpool.local
      MAIL_FROM_NAME: Kpool
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
    depends_on:
      - db
      - redis
    networks:
      - kpool-network
    expose:
      - "9000"

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      - php
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - kpool-network

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: kpool
      POSTGRES_USER: kpool
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - kpool-network

  testing_db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: kpool
      POSTGRES_USER: kpool
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - testing_db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - kpool-network

  redis:
    image: redis:8-alpine
    networks:
      - kpool-network

  mail:
    image: axllent/mailpit:latest
    ports:
      - "19925:1025"
      - "19980:8025"
    volumes:
      - ./mailpit:/data
    environment:
      TZ: Asia/Tokyo
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - kpool-network

volumes:
  db_data:
  testing_db_data:

networks:
  kpool-network:
    name: kpool-network
    driver: bridge
