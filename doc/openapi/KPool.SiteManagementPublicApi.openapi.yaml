openapi: 3.0.0
info:
  title: k-pool Site Management Public API
  version: 0.0.0
tags: []
paths:
  /contact/submit/v{version}:
    post:
      operationId: ContactOperations_submitContact
      description: Submit a contact inquiry.
      parameters:
        - name: version
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '201':
          description: Response returned when a contact inquiry is created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactSummary'
        '422':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KPool.Common.ProblemDetails'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KPool.Common.ProblemDetails'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitContactRequestBody'
components:
  schemas:
    ContactCategory:
      type: number
      enum:
        - 1
        - 2
        - 3
        - 99
      description: Contact category accepted by the submit-contact endpoint.
    ContactSummary:
      type: object
      required:
        - contactIdentifier
        - category
        - name
        - email
        - content
      properties:
        contactIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Contact identifier.
        identityIdentifier:
          type: string
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          nullable: true
          description: Identity identifier when the inquiry is associated with a signed-in user.
        category:
          type: integer
          format: int32
          description: Category of the inquiry.
        name:
          type: string
          description: Name of the person submitting the inquiry.
        email:
          type: string
          description: Email address of the person submitting the inquiry.
        content:
          type: string
          description: Inquiry details.
      description: Submitted contact snapshot returned after creation.
    KPool.Common.ProblemDetails:
      type: object
      properties:
        type:
          type: string
          description: URI reference identifying the problem type.
        status:
          type: integer
          format: int32
          description: HTTP status code.
        title:
          type: string
          description: Short error title.
        detail:
          type: string
          description: Human-readable error detail.
        instance:
          type: string
          description: URI reference identifying the specific occurrence.
      description: RFC 9457 Problem Details payload shared by JSON error responses.
    KPool.Common.Uuid:
      type: string
      format: uuid
      description: UUID identifier.
    SubmitContactRequestBody:
      type: object
      required:
        - category
        - name
        - email
        - content
      properties:
        category:
          allOf:
            - $ref: '#/components/schemas/ContactCategory'
          description: Category of the inquiry.
        name:
          type: string
          description: Name of the person submitting the inquiry.
        email:
          type: string
          description: Email address of the person submitting the inquiry.
        content:
          type: string
          description: Inquiry details.
      description: Request body for submitting a contact inquiry.
servers:
  - url: /api/site-management
    description: Laravel route prefix from bootstrap/app.php.
    variables: {}
