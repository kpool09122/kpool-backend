          type: string
          description: Alternative text for the image.
        agreedToTermsAt:
          type: string
          description: Timestamp when the uploader agreed to the terms.
      description: Request body for uploading an image.
    VideoLinkInput:
      type: object
      required:
        - url
        - videoUsage
        - displayOrder
      properties:
        url:
          type: string
          description: Video URL.
        videoUsage:
          type: string
          description: Usage category of the video.
        title:
          type: string
          description: Video title.
        displayOrder:
          type: integer
          format: int32
          description: Display order of the video link.
        thumbnailUrl:
          type: string
          description: Thumbnail image URL.
        publishedAt:
          type: string
          description: Publication timestamp of the video.
      description: Input payload for a single video link.
    WikiAssociationTargets:
      type: object
      properties:
        agencyIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Associated agency identifier.
        groupIdentifiers:
          type: array
          items:
            $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Associated group identifiers.
        talentIdentifiers:
          type: array
          items:
            $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Associated talent identifiers.
      description: Association targets that link a wiki to related agencies, groups, or talents.
    WikiWorkflowRequestBody:
      type: object
      required:
        - resourceType
      properties:
        resourceType:
          type: string
          description: Resource type that the wiki belongs to.
      allOf:
        - $ref: '#/components/schemas/WikiAssociationTargets'
      description: Request body for wiki workflow actions.
servers:
  - url: /api/wiki
    description: Laravel route prefix from bootstrap/app.php.
    variables: {}
