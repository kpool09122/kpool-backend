        translationSetIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Translation set identifier.
        slug:
          type: string
          description: Unique slug of the wiki.
        language:
          type: string
          description: Language of the wiki.
        resourceType:
          type: string
          description: Resource type that the wiki belongs to.
        themeColor:
          type: string
          nullable: true
          description: Theme color applied to the wiki.
        heroImage:
          allOf:
            - $ref: '#/components/schemas/DraftWikiHeroImage'
          description: Hero image payload for the editor.
        basic:
          allOf:
            - $ref: '#/components/schemas/GroupDraftWikiBasic'
          description: Basic wiki content payload.
        sections:
          type: array
          items: {}
          description: Section content payloads.
      description: Detailed draft wiki payload used by the editor.
    DraftWikiHeroImage:
      type: object
      required:
        - imageIdentifier
        - src
        - alt
      properties:
        imageIdentifier:
          type: string
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          nullable: true
          description: Image identifier shown as the hero image.
        src:
          type: string
          nullable: true
          description: Resolved hero image URL.
        alt:
          type: string
          nullable: true
          description: Hero image alternative text.
      description: Hero image payload for a draft wiki.
    DraftWikiListItem:
      type: object
      required:
        - wikiIdentifier
        - publishedWikiIdentifier
        - translationSetIdentifier
        - slug
        - language
        - resourceType
        - themeColor
        - status
        - name
        - normalizedName
        - imageIdentifier
        - imageUrl
        - imageAltText
        - editedAt
        - approvedAt
        - translatedAt
        - mergedAt
      properties:
        wikiIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Draft wiki identifier.
        publishedWikiIdentifier:
          type: string
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          nullable: true
          description: Published wiki identifier linked to this draft.
        translationSetIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Translation set identifier.
        slug:
          type: string
          description: Unique slug for the wiki.
        language:
          type: string
          description: Language of the wiki.
        resourceType:
          type: string
          description: Resource type that the wiki belongs to.
        themeColor:
          type: string
          nullable: true
          description: Theme color applied to the wiki.
        status:
          allOf:
            - $ref: '#/components/schemas/DraftWikiStatus'
          description: Approval status of the draft wiki.
        name:
          type: string
          description: Display name of the wiki.
        normalizedName:
          type: string
          description: Normalized name used for search.
        imageIdentifier:
          type: string
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          nullable: true
          description: Representative image identifier for the draft wiki.
        imageUrl:
          type: string
          nullable: true
          description: Absolute URL of the representative image.
        imageAltText:
          type: string
          nullable: true
          description: Alternative text of the representative image.
        editedAt:
          type: string
          nullable: true
          description: Timestamp when the draft was edited.
        approvedAt:
          type: string
          nullable: true
          description: Timestamp when the draft was approved.
        translatedAt:
          type: string
          nullable: true
          description: Timestamp when the draft was translated.
        mergedAt:
          type: string
          nullable: true
          description: Timestamp when the draft was merged.
      description: Draft wiki list item returned by the draft wiki list endpoint.
    DraftWikiStatus:
      type: string
      enum:
        - approved
        - pending
        - rejected
        - under_review
      description: Approval status assigned to a draft wiki.
