components:
  schemas:
    AgencyDraftWikiBasic:
      type: object
      required:
        - name
        - normalizedName
        - ceo
        - normalizedCeo
        - officialWebsite
        - socialLinks
      properties:
        name:
          type: string
          description: Display name of the agency.
        normalizedName:
          type: string
          description: Normalized name of the agency.
        ceo:
          type: string
          description: Chief executive officer of the agency.
        normalizedCeo:
          type: string
          description: Normalized chief executive officer name.
        foundedIn:
          type: string
          format: date
          description: Date when the agency was founded.
        parentAgencyIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Parent agency identifier.
        status:
          type: string
          description: Current activity status of the agency.
        logoImageIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Logo image identifier of the agency.
        officialWebsite:
          type: string
          description: Official website of the agency.
        socialLinks:
          type: array
          items:
            type: string
          description: Social links of the agency.
      description: Basic payload for an agency draft wiki.
    AgencyDraftWikiDetail:
      type: object
      required:
        - wikiIdentifier
        - slug
        - language
        - resourceType
        - version
        - heroImage
        - basic
        - sections
      properties:
        wikiIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Draft wiki identifier.
        slug:
          type: string
          description: Unique slug of the wiki.
        language:
          type: string
          description: Language of the wiki.
        resourceType:
          type: string
          description: Resource type that the wiki belongs to.
        version:
          type: integer
          format: int32
          description: Published version number associated with the draft.
        themeColor:
          type: string
          description: Theme color applied to the wiki.
        heroImage:
          allOf:
            - $ref: '#/components/schemas/DraftWikiHeroImage'
          description: Hero image payload for the editor.
        basic:
          allOf:
            - $ref: '#/components/schemas/AgencyDraftWikiBasic'
          description: Basic agency wiki content payload.
        sections:
          type: array
          items: {}
          description: Section content payloads.
      description: Detailed agency draft wiki payload used by the editor.
    AttachPolicyToRoleRequestBody:
      type: object
      required:
        - policyIdentifier
      properties:
        policyIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Policy identifier to mutate.
      description: Request body for attaching or detaching a policy from a role.
    AttachRoleToPrincipalGroupRequestBody:
      type: object
      required:
        - roleIdentifier
      properties:
        roleIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Role identifier to mutate.
      description: Request body for attaching or detaching a role from a principal group.
    AutoCreateWikiRequestBody:
      type: object
      required:
        - resourceType
        - language
        - name
      properties:
        resourceType:
          type: string
          description: Resource type that the wiki belongs to.
        language:
          type: string
          description: Language of the wiki.
        name:
          type: string
          description: Display name of the wiki.
      allOf:
        - $ref: '#/components/schemas/WikiAssociationTargets'
      description: Request body for automatically creating a wiki draft.
    CreatePolicyRequestBody:
      type: object
      required:
        - name
        - statements
        - isSystemPolicy
      properties:
        name:
          type: string
          description: Policy name.
        statements:
          type: array
          items:
            $ref: '#/components/schemas/PolicyStatement'
          description: Statements that define the policy.
        isSystemPolicy:
          type: boolean
          description: Whether this is a system policy.
      description: Request body for creating a policy.
    CreatePrincipalGroupRequestBody:
      type: object
      required:
        - accountIdentifier
        - name
      properties:
        accountIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Account identifier that owns the principal group.
        name:
          type: string
          description: Principal group name.
      description: Request body for creating a principal group.
    CreatePrincipalRequestBody:
      type: object
      required:
        - identityIdentifier
        - accountIdentifier
      properties:
        identityIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Identity identifier to bind to the principal.
        accountIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Account identifier that owns the principal.
      description: Request body for creating a principal.
    CreateRoleRequestBody:
      type: object
      required:
        - name
        - isSystemRole
      properties:
        name:
          type: string
          description: Role name.
        policies:
          type: array
          items:
            $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Policy identifiers attached to the role.
        isSystemRole:
          type: boolean
          description: Whether this is a system role.
      description: Request body for creating a role.
    CreateWikiRequestBody:
      type: object
      required:
        - resourceType
        - language
        - slug
        - basic
      properties:
        resourceType:
          type: string
          description: Resource type that the wiki belongs to.
        language:
          type: string
          description: Language of the wiki.
        slug:
          type: string
          description: Unique slug for the wiki.
        basic:
          description: Basic wiki content payload.
        sections:
          type: array
          items: {}
          description: Section content payloads.
        themeColor:
          type: string
          description: Theme color applied to the wiki.
        publishedWikiIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Published wiki identifier to branch from.
      allOf:
        - $ref: '#/components/schemas/WikiAssociationTargets'
      description: Request body for creating a wiki draft.
    DraftWikiDetail:
      type: object
      required:
        - wikiIdentifier
        - slug
        - language
        - resourceType
        - version
        - heroImage
        - basic
        - sections
      properties:
