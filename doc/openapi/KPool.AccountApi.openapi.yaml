components:
  schemas:
    AccountSummary:
      type: object
      required:
        - accountIdentifier
        - email
        - type
        - name
        - status
      properties:
        accountIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Account identifier.
        email:
          type: string
          description: Account email address.
        type:
          type: string
          description: Account type.
        name:
          type: string
          description: Account display name.
        status:
          type: string
          description: Account status.
      description: Current account state.
    AccountVerificationSummary:
      type: object
      required:
        - verificationIdentifier
        - accountIdentifier
        - verificationType
        - status
        - applicantName
        - requestedAt
        - documents
      properties:
        verificationIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Verification identifier.
        accountIdentifier:
          allOf:
            - $ref: '#/components/schemas/KPool.Common.Uuid'
          description: Account identifier under review.
        verificationType:
          type: string
