name: Update Frontend Zod Schemas

on:
  workflow_dispatch:
    inputs:
      frontend_base_branch:
        description: Frontend pull request target branch
        required: true
        default: main
        type: string

permissions:
  contents: read

env:
  FRONTEND_REPOSITORY: kpool09122/kpool-frontend
  FRONTEND_CHECKOUT_PATH: frontend
  FRONTEND_BRANCH_PREFIX: change-zod-schema
  FRONTEND_PR_TITLE: Zodスキーマの更新
  OPENAPI_ZOD_CLIENT_VERSION: 1.18.3
  FRONTEND_ZOD_VERSION: 3.25.76
  FRONTEND_ZODIOS_CORE_VERSION: 10.9.6

jobs:
  update-frontend-zod-schemas:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install backend TypeSpec dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate latest OpenAPI specs
        run: pnpm run typespec:compile

      - name: Checkout frontend repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.FRONTEND_REPOSITORY }}
          path: ${{ env.FRONTEND_CHECKOUT_PATH }}
          ref: ${{ inputs.frontend_base_branch }}
          # This token must be able to read, push, and create pull requests on kpool09122/kpool-frontend.
          token: ${{ secrets.KPOOL_FRONTEND_PR_TOKEN }}

      - name: Install frontend runtime dependencies for generated schemas
        working-directory: ${{ env.FRONTEND_CHECKOUT_PATH }}
        run: pnpm add --save-exact -w zod@${FRONTEND_ZOD_VERSION} @zodios/core@${FRONTEND_ZODIOS_CORE_VERSION}

      - name: Generate frontend Zod schemas
        run: ./scripts/generate_frontend_zod_schemas.sh "${GITHUB_WORKSPACE}/${FRONTEND_CHECKOUT_PATH}"

      - name: Verify frontend lint and build
        working-directory: ${{ env.FRONTEND_CHECKOUT_PATH }}
        run: |
          pnpm run lint
          pnpm run build

      - name: Detect frontend changes
        id: changes
        working-directory: ${{ env.FRONTEND_CHECKOUT_PATH }}
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "branch_name=${FRONTEND_BRANCH_PREFIX}-$(openssl rand -hex 4)" >> "$GITHUB_OUTPUT"

      - name: Create frontend branch, commit, and push
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: ${{ env.FRONTEND_CHECKOUT_PATH }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.changes.outputs.branch_name }}"
          git add package.json pnpm-lock.yaml packages/types/src
          git commit -m "chore: update generated zod schemas"
          git push --set-upstream origin "${{ steps.changes.outputs.branch_name }}"

      - name: Render frontend PR body
        if: steps.changes.outputs.has_changes == 'true'
        run: ./scripts/render_frontend_zod_pr_body.sh "${RUNNER_TEMP}/frontend-zod-pr-body.md"

      - name: Create frontend pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.KPOOL_FRONTEND_PR_TOKEN }}
          FRONTEND_BASE_BRANCH: ${{ inputs.frontend_base_branch }}
        working-directory: ${{ env.FRONTEND_CHECKOUT_PATH }}
        run: |
          gh pr create \
            --repo "${FRONTEND_REPOSITORY}" \
            --base "${FRONTEND_BASE_BRANCH}" \
            --head "${{ steps.changes.outputs.branch_name }}" \
            --title "${FRONTEND_PR_TITLE}" \
            --body-file "${RUNNER_TEMP}/frontend-zod-pr-body.md"

      - name: Summarize no-op run
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "No frontend schema changes were detected." >> "$GITHUB_STEP_SUMMARY"
